# LIBERO-10 quick test — 5 episodes per task
server:
  url: "ws://localhost:8000"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    mode: sync
    episodes_per_task: 5
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
